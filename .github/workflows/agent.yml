name: Debug Workflow

on:
  push:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show full directory
        run: |
          pwd
          ls -R

      - name: Check file existence
        run: |
          if [ -f app.py ]; then echo "app.py FOUND"; else echo "app.py NOT FOUND"; fi